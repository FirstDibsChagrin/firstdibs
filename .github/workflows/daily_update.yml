name: Daily Data Update

on:
  schedule:
    - cron: '0 8 * * *'   # 8am UTC every day
  workflow_dispatch:        # lets you trigger manually from GitHub

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run data update
        # Script reads feature_flags.py first and exits safely if all flags are off
        # No API calls are made unless you explicitly enable flags
        env:
          RENTCAST_KEY: ${{ secrets.RENTCAST_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        working-directory: scripts
        run: python update_data.py

      - name: Log result
        run: echo "Completed at $(date)"
