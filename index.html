<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>First Dibs — Risk Map</title>

<script>
const SUPABASE_URL = 'https://lhlmcvlyfyzpyzewlxdo.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxobG1jdmx5Znl6cHl6ZXdseGRvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNDUyODIsImV4cCI6MjA4OTYyMTI4Mn0.mnP6GbwwoHe0L5DxGIXSKjW5pZhCwnoIBjWn6hXeElQ';
</script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{font-family:sans-serif;margin:0}
#map{height:70vh}
.panel{padding:16px}
.big{font-size:48px;font-weight:bold}
.low{color:green}
.med{color:orange}
.high{color:red}
</style>
</head>

<body>

<div class="panel">
  <h2>First Dibs — Outbid Risk</h2>
  <input id="zipInput" placeholder="Enter ZIP"/>
  <button onclick="loadZip()">Go</button>

  <div id="result"></div>
</div>

<div id="map"></div>

<script>
let map = L.map('map').setView([41.48,-81.69],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

let layers = {};

function fetchTable(table, zip){
  return fetch(`${SUPABASE_URL}/rest/v1/${table}?zip=eq.${zip}`,{
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:`Bearer ${SUPABASE_KEY}`
    }
  }).then(r=>r.json());
}

function riskScore(ownership, dom){
  let domScore = dom<5?100:dom<10?75:dom<20?50:25;
  return Math.round(0.6*ownership + 0.4*domScore);
}

function riskLabel(score){
  if(score>=75) return ["HIGH","high"];
  if(score>=50) return ["MODERATE","med"];
  return ["LOW","low"];
}

async function loadAllZips(){
  let boundaries = await fetch(`${SUPABASE_URL}/rest/v1/zip_boundaries`,{
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:`Bearer ${SUPABASE_KEY}`
    }
  }).then(r=>r.json());

  let ownership = await fetch(`${SUPABASE_URL}/rest/v1/ownership_stats`,{
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:`Bearer ${SUPABASE_KEY}`
    }
  }).then(r=>r.json());

  let stats = await fetch(`${SUPABASE_URL}/rest/v1/market_stats`,{
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:`Bearer ${SUPABASE_KEY}`
    }
  }).then(r=>r.json());

  let ownershipMap = Object.fromEntries(ownership.map(o=>[o.zip,o]));
  let statsMap = Object.fromEntries(stats.map(s=>[s.zip,s]));

  boundaries.forEach(b=>{
    let geo = JSON.parse(b.geojson);

    let own = ownershipMap[b.zip];
    let st = statsMap[b.zip];

    if(!own || !st) return;

    let score = riskScore(own.corporate_pct||0, st.avg_days_on_market||20);
    let [label,color] = riskLabel(score);

    let layer = L.geoJSON(geo,{
      style:{
        color:color==="high"?"red":color==="med"?"orange":"green",
        fillOpacity:0.3
      }
    }).addTo(map);

    layer.bindPopup(`
      ZIP ${b.zip}<br>
      Risk: ${score}/100 (${label})
    `);

    layers[b.zip]=layer;
  });
}

async function loadZip(){
  let zip = document.getElementById("zipInput").value;

  let [own] = await fetchTable("ownership_stats",zip);
  let [st] = await fetchTable("market_stats",zip);

  if(!own || !st){
    document.getElementById("result").innerHTML="No data available yet";
    return;
  }

  let score = riskScore(own.corporate_pct, st.avg_days_on_market);
  let [label,color] = riskLabel(score);

  document.getElementById("result").innerHTML=`
    <div class="big ${color}">${score}</div>
    <div>${label} RISK</div>
    <div>Investor: ${own.corporate_pct}%</div>
    <div>DOM: ${st.avg_days_on_market}</div>
  `;

  if(layers[zip]){
    map.fitBounds(layers[zip].getBounds());
  }
}

loadAllZips();
</script>

</body>
</html>
